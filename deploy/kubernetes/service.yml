apiVersion: v1
kind: Service
metadata:
  name: guardrails-llm-filter
  labels:
    app: guardrails-llm-filter
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
    - name: api
      port: 9080
      targetPort: 9080
  selector:
    app: guardrails-llm-filter
  type: ClusterIP
