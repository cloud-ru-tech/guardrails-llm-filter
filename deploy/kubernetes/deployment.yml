apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrails-llm-filter
  labels:
    app: guardrails-llm-filter
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: guardrails-llm-filter
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: guardrails-llm-filter
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: guardrails-llm-filter
          image: ghcr.io/cloud-ru-tech/guardrails-llm-filter:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: guardrails-llm-filter-env
            - secretRef:
                name: guardrails-llm-filter-secrets
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
            - containerPort: 9080
              name: api
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: guardrails-llm-filter
                topologyKey: kubernetes.io/hostname
              weight: 1
